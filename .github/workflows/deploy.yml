name: Build and Deploy Astro to FTP

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [backend_update]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Install dependencies
        run: npm ci

      - name: Sync Backend Content
        run: npm run sync:prod
        env:
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL || 'https://backend.claesen-verlichting.be/v1/website' }}

      - name: Build Project
        run: |
          npm run build:prod
          cp -r public/v1-media dist/v1-media || true
        env:
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL || 'https://backend.claesen-verlichting.be/v1/website' }}
          PUBLIC_USE_STATIC_CACHE: 'true'
        
      - name: Deploy via LFTP (Non-Destructive Sync)
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_SERVER }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq lftp
          lftp -c "
          set sftp:auto-confirm yes;
          set sftp:chmod-ignore yes;
          set sftp:connect-program 'ssh -o StrictHostKeyChecking=no';
          set net:timeout 60;
          set net:max-retries 10;
          set net:reconnect-interval-base 5;
          open -u $FTP_USER,'$FTP_PASS' sftp://$FTP_HOST:2222;
          
          # NO --delete flag here to avoid permission errors on removals.
          # We simply overwrite and add new files.
          # First, ensure the critical JSON is prioritize-uploaded.
          put -O /v1/v1-media/ ./dist/v1-media/projects-static.json || echo 'Individual JSON upload failed, proceeding to mirror';
          
          # Then, mirror everything else.
          mirror -R --verbose ./dist /v1;
          
          quit;
          "
