name: Build and Deploy Astro to FTP

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [backend_update]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm ci

      - name: Sync Backend Content
        run: npm run sync:prod
        env:
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL || 'https://backend.claesen-verlichting.be/v1/website' }}

      - name: Build Project
        run: npm run build:prod
        
      - name: Deploy via SFTP (SCP Action)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 2222
          source: "dist/*"
          target: "/"
          strip_components: 1
